format = "$status $username $directory $git_branch$fill $time\n  [уұһӘ](fg:iris) "
palette = "rose-pine"

[username]
disabled = false
format = "[оӮ¶](fg:ground)[ у°§ұ $user ]($style)[оӮҙ](fg:ground)"
show_always = true
style_root = "bg:ground fg:flower"
style_user = "bg:ground fg:flower"

[directory]
format = [оӮ¶](fg:ground)[$path]($style)[оӮҙ](fg:ground)
style = "bg:ground fg:light"
truncation_length = 3
truncation_symbol = ".../"

[git_branch]
format = "[оӮ¶](fg:ground)[ $symbol $branch ]($style)[оӮҙ](fg:ground)"
style = "bg:ground fg:moss"
symbol = "пҗҳ"

[time]
disabled = false
format = "[оӮ¶](fg:ground)[ $time у°ҙҲ ]($style)[оӮҙ](fg:ground)"
style = "bg:ground fg:moss"
time_format = "%I:%M%P"
use_12hr = true

[palettes.lily-pad]
ground = '0a3323'
water = '105666'
moss = '839958'
flower = 'd3968c'
light = 'f7f4d5'