format = "$username $directory $git_branch$fill $time\n  [уұһӘ](fg:light) "
palette = "winter-wonder"

[username]
disabled = false
format = "[оӮ¶](fg:charcoal)[ у°§ұ $user ]($style)[оӮҙ](fg:charcoal)"
show_always = true
style_root = "bg:charcoal fg:powder"
style_user = "bg:charcoal fg:powder"

[directory]
format = "[оӮ¶](fg:charcoal)[$path]($style)[оӮҙ](fg:charcoal)"
style = "bg:charcoal fg:powder"
truncation_length = 3
truncation_symbol = ".../"

[git_branch]
format = "[оӮ¶](fg:charcoal)[ $symbol $branch ]($style)[оӮҙ](fg:charcoal)"
style = "bg:charcoal fg:frost"
symbol = "пҗҳ"

[time]
disabled = false
format = "[оӮ¶](fg:charcoal)[ $time у°ҙҲ ]($style)[оӮҙ](fg:charcoal)"
style = "bg:charcoal fg:mist"
time_format = "%I:%M%P"
use_12hr = true

[fill]
style = "fg:charcoal"
symbol = " "

[palettes.winter-wonder]
charcoal = '#262d35'
slate = '#24425e'
frost = '#4369ab'
mist = '#9daad5'
powder = '#c2e0ec'
