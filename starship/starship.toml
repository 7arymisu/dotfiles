format = "$username $directory $git_branch $time\n  [َ±‍ھ](fg:light) "
palette = "winter-wonder"

[username]
disabled = false
format = "[î‚¶](fg:charcoal)[ َ°§± $user ]($style)[î‚´](fg:charcoal)"
show_always = true
style_root = "bg:charcoal fg:powder"
style_user = "bg:charcoal fg:powder"

[directory]
format = "[î‚¶](fg:charcoal)[$path]($style)[î‚´](fg:charcoal)"
style = "bg:charcoal fg:powder"
