format = "$username $directory $git_branch$fill $time\n  [уұһӘ](fg:font) "
palette = "starry-night"

[username]
disabled = false
format = "[оӮ¶](fg:base)[ уұқҒ $user ]($style)[оӮҙ](fg:base)"
show_always = true
style_root = "bg:base fg:font"
style_user = "bg:base fg:font"

[directory]
format = "[оӮ¶](fg:base)[$path]($style)[оӮҙ](fg:base)"
style = "bg:base fg:font"
truncation_length = 3
truncation_symbol = ".../"

[git_branch]
format = "[оӮ¶](fg:base)[ $symbol $branch ]($style)[оӮҙ](fg:base)"
style = "bg:base fg:accent"
symbol = "пҗҳ"

[time]
disabled = false
format = "[оӮ¶](fg:base)[ $time о»Ҝ ]($style)[оӮҙ](fg:base)"
style = "bg:base fg:pop"
time_format = "%I:%M%P"
use_12hr = true

[fill]
style = "fg:dim"
symbol = " "

[palettes.starry-night]
base = '#191939'
dim = '#1b3a68'
font = '#f2e199'
accent = '#6fb8e6'
pop = '#ecb44d'
