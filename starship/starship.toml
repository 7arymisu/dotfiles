truncation_symbol = ".../"

[git_branch]
format = "[î‚¶](fg:charcoal)[ $symbol $branch ]($style)[î‚´](fg:charcoal)"
style = "bg:charcoal fg:frost"
symbol = "ïگک"

[time]
disabled = false
format = "[î‚¶](fg:charcoal)[ $time َ°´ˆ ]($style)[î‚´](fg:charcoal)"
